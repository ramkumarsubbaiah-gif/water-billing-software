<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Water Supply Billing</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <span class="droplet">💧</span>
    <div>
      <h1 id="shopNameHeader">Water Supply Shop</h1>
      <div class="tagline">Admin Panel</div>
    </div>
  </div>
  <nav class="app-nav">
    <a href="/">Billing</a>
    <a href="/reports.html">Reports</a>
    <a href="/admin.html" class="active">Admin</a>
  </nav>
</header>

<div class="container">

  <!-- ================= LOGIN VIEW ================= -->
  <div id="loginView" class="hidden">
    <div class="login-wrap panel">
      <div class="droplet-big">🔒</div>
      <h2>Admin Login</h2>
      <p class="sub">Log in to manage products and shop settings</p>
      <div id="loginAlert"></div>
      <div class="field">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" placeholder="admin">
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button id="loginBtn" class="btn btn-primary btn-block btn-lg">Log In</button>
    </div>
  </div>

  <!-- ================= ADMIN PANEL VIEW ================= -->
  <div id="panelView" class="hidden">

    <div class="flex-between panel" style="margin-bottom:18px;">
      <div>
        Logged in as <strong id="loggedInUser">admin</strong>
      </div>
      <button id="logoutBtn" class="btn btn-outline">Log Out</button>
    </div>

    <div class="admin-grid">

      <!-- LEFT COLUMN: Shop settings + Add/Edit product form -->
      <div>
        <div class="panel">
          <div class="panel-title">🏪 Shop Settings</div>
          <div class="field">
            <label for="settingsShopName">Shop Name</label>
            <input type="text" id="settingsShopName" placeholder="e.g. Sri Aqua Water Supply">
          </div>
          <div class="field">
            <label for="settingsUpiId">UPI ID (for QR payments)</label>
            <input type="text" id="settingsUpiId" placeholder="e.g. yourshop@upi">
          </div>
          <button id="saveSettingsBtn" class="btn btn-primary btn-block">Save Settings</button>
          <div id="settingsAlert"></div>
        </div>

        <div class="panel">
          <div class="panel-title" id="productFormTitle">➕ Add Product</div>
          <form class="product-form" id="productForm">
            <input type="hidden" id="productId">
            <div class="field">
              <label for="pName">Product Name</label>
              <input type="text" id="pName" placeholder="e.g. Aqua Pure" required>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="pCategory">Category</label>
                <select id="pCategory">
                  <option value="Water">Water</option>
                  <option value="Cold Drink">Cold Drink</option>
                </select>
              </div>
              <div class="field">
                <label for="pVariant">Variant</label>
                <input type="text" id="pVariant" placeholder="e.g. 500ml" required>
              </div>
            </div>
            <div class="field">
              <label for="pPrice">Price (₹)</label>
              <input type="number" id="pPrice" min="0" step="0.01" placeholder="e.g. 10" required>
            </div>
            <div class="field">
              <label>Product Image</label>
              <div class="image-upload" id="imageUploadBox">
                <div id="imagePreviewArea">📷 Click to upload image</div>
              </div>
              <input type="file" id="pImage" accept="image/*" class="hidden">
            </div>
            <div class="field">
              <label style="display:flex; align-items:center; gap:8px; text-transform:none;">
                <input type="checkbox" id="pActive" style="width:auto;" checked> Active (visible on billing screen)
              </label>
            </div>
            <div style="display:flex; gap:8px;">
              <button type="submit" id="saveProductBtn" class="btn btn-primary btn-block">Add Product</button>
              <button type="button" id="cancelEditBtn" class="btn btn-outline hidden">Cancel</button>
            </div>
            <div id="productFormAlert"></div>
          </form>
        </div>
      </div>

      <!-- RIGHT COLUMN: Product list -->
      <div class="panel">
        <div class="panel-title">📦 Products</div>
        <div style="overflow-x:auto;">
          <table class="data-table" id="productsTable">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Variant</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr><td colspan="7" class="text-muted" style="text-align:center; padding:20px;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="/js/admin.js"></script>
</body>
</html>
