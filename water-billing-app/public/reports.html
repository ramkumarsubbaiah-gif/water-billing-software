<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Reports — Water Supply Billing</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <span class="droplet">💧</span>
    <div>
      <h1 id="shopNameHeader">Water Supply Shop</h1>
      <div class="tagline">Sales Reports</div>
    </div>
  </div>
  <nav class="app-nav">
    <a href="/">Billing</a>
    <a href="/reports.html" class="active">Reports</a>
    <a href="/admin.html">Admin</a>
  </nav>
</header>

<div class="container">

  <!-- ================= DAILY REPORT ================= -->
  <div class="panel">
    <div class="panel-title">📅 Daily Sales</div>
    <div class="report-controls">
      <div class="field" style="margin-bottom:0;">
        <label for="dailyDate">Select Date</label>
        <input type="date" id="dailyDate">
      </div>
      <button id="downloadDailyCsvBtn" class="btn btn-accent">⬇ Download CSV</button>
    </div>

    <div class="stat-cards">
      <div class="stat-card">
        <div class="s-label">Total Bills</div>
        <div class="s-value" id="dailyCount">0</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Total Revenue</div>
        <div class="s-value" id="dailyRevenue">₹0.00</div>
      </div>
    </div>

    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Bill No</th>
            <th>Items</th>
            <th>Payment</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="dailyTableBody">
          <tr><td colspan="5" class="text-muted" style="text-align:center; padding:20px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ================= MONTHLY REPORT ================= -->
  <div class="panel">
    <div class="panel-title">📊 Monthly Sales</div>
    <div class="report-controls">
      <div class="field" style="margin-bottom:0;">
        <label for="monthlyMonth">Select Month</label>
        <input type="month" id="monthlyMonth">
      </div>
      <button id="downloadMonthlyCsvBtn" class="btn btn-accent">⬇ Download CSV</button>
    </div>

    <div class="stat-cards">
      <div class="stat-card">
        <div class="s-label">Total Bills</div>
        <div class="s-value" id="monthlyCount">0</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Total Revenue</div>
        <div class="s-value" id="monthlyRevenue">₹0.00</div>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="monthlyChart" height="90"></canvas>
    </div>

    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Bills</th>
            <th>Revenue</th>
          </tr>
        </thead>
        <tbody id="monthlyTableBody">
          <tr><td colspan="3" class="text-muted" style="text-align:center; padding:20px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="/js/reports.js"></script>
</body>
</html>
